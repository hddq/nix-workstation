name: Lint

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - name: Run Linters
      run: nix develop --command bash -c "statix check . && deadnix . && alejandra --check ."
    - name: Check Flake
      run: nix flake check
